name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-path

      - name: Cache ncnn binary download
        uses: actions/cache@v4
        with:
          path: .build/cache/ncnn
          key: ncnn-vulkan-20220424-${{ runner.os }}

      - name: Cache Core ML model download
        uses: actions/cache@v4
        with:
          path: .build/cache/coreml
          key: coreml-realesrgan-mszpro-2024-07-15-${{ runner.os }}

      - name: Fetch ncnn-vulkan binary + models
        run: ./scripts/fetch-ncnn-binary.sh

      - name: Fetch Core ML model + compile to .mlmodelc
        run: ./scripts/fetch-coreml-model.sh

      - name: Build executable (release)
        run: |
          swift build -c release
          ls -lh .build/release/

      - name: Generate BUILD_INFO.json
        env:
          VERSION: ${{ github.ref_name }}
        run: ./scripts/generate-build-info.sh

      - name: Package macOS .app
        env:
          VERSION: ${{ github.ref_name }}
          # Sparkle public key — embedded in Info.plist via package-app.sh.
          # When unset, package-app.sh omits Sparkle config (silent fallback).
          SU_PUBLIC_KEY: ${{ secrets.SU_PUBLIC_KEY }}
        run: ./scripts/package-app.sh

      - name: Sign, Notarize & Package DMG
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP="build/GenesisImaging.app"
          # Tag-versioned artifact names — different versions side-by-side on user disk.
          DMG="genesis-imaging-${GITHUB_REF_NAME}-darwin-arm64.dmg"
          ARTIFACT="genesis-imaging-${GITHUB_REF_NAME}-darwin-arm64"

          _create_dmg() {
            brew install create-dmg
            mkdir -p dmg-staging
            cp -R "${APP}" dmg-staging/
            create-dmg \
              --volname "Genesis Imaging" \
              --window-pos 200 120 \
              --window-size 560 400 \
              --icon-size 100 \
              --icon "GenesisImaging.app" 140 200 \
              --app-drop-link 420 200 \
              --no-internet-enable \
              "${DMG}" "dmg-staging/" || true
            rm -rf dmg-staging
          }

          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::warning::Apple signing secrets not configured — producing unsigned build"
            _create_dmg || true
            ditto -c -k --sequesterRsrc --keepParent "${APP}" "${ARTIFACT}.zip"
            ls -lh ${ARTIFACT}.* 2>/dev/null || true
            exit 0
          fi

          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm certificate.p12

          IDENTITY="Developer ID Application: ${APPLE_DEVELOPER_NAME} (${APPLE_TEAM_ID})"
          echo "Signing with: $IDENTITY"

          # Inside-out signing order (Apple's nested-signing rule):
          # nested helpers/services first → framework → bundled binaries →
          # main executable → outer .app. Re-signing Sparkle with our identity
          # is required for notarization (each Mach-O must carry our team's
          # Developer ID signature + secure timestamp + Hardened Runtime).
          SPARKLE_FW="${APP}/Contents/Frameworks/Sparkle.framework"
          SPARKLE_VER="${SPARKLE_FW}/Versions/B"
          if [ -d "$SPARKLE_FW" ]; then
            # Sparkle 2.x XPC services (Installer + Downloader)
            for xpc in "${SPARKLE_VER}/XPCServices"/*.xpc; do
              [ -d "$xpc" ] || continue
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "$xpc"
            done
            # Autoupdate helper (Mach-O)
            if [ -f "${SPARKLE_VER}/Autoupdate" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "${SPARKLE_VER}/Autoupdate"
            fi
            # Updater.app helper bundle
            if [ -d "${SPARKLE_VER}/Updater.app" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "${SPARKLE_VER}/Updater.app"
            fi
            # Framework as a whole (signs the versioned Sparkle dylib + _CodeSignature)
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$SPARKLE_FW"
            echo "✅ Sparkle.framework re-signed (XPCs + Autoupdate + Updater.app + fw)"
          else
            echo "::warning::Sparkle.framework not bundled — auto-update will fail; check package-app.sh"
          fi

          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "${APP}/Contents/Resources/bin/realesrgan-ncnn-vulkan"
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "${APP}/Contents/MacOS/GenesisImaging"
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "${APP}"
          codesign --verify --deep --strict --verbose=2 "${APP}"
          echo "✅ .app signed"

          ditto -c -k --sequesterRsrc --keepParent "${APP}" "${ARTIFACT}-notarize.zip"
          xcrun notarytool submit "${ARTIFACT}-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600
          rm "${ARTIFACT}-notarize.zip"
          xcrun stapler staple "${APP}"
          xcrun stapler validate "${APP}"
          echo "✅ .app notarized + stapled"

          _create_dmg

          if [ -f "${DMG}" ]; then
            codesign --force --sign "$IDENTITY" "${DMG}"
            codesign --verify --verbose=2 "${DMG}"
            echo "✅ DMG signed"

            xcrun notarytool submit "${DMG}" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 600
            xcrun stapler staple "${DMG}"
            echo "✅ DMG notarized + stapled"
          else
            echo "::warning::DMG creation failed — zip-only distribution"
          fi

          ditto -c -k --sequesterRsrc --keepParent "${APP}" "${ARTIFACT}.zip"
          ls -lh ${ARTIFACT}.* 2>/dev/null || true

          security delete-keychain "$KEYCHAIN"

      - name: Generate + sign appcast.xml
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY != '' }}
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
          VERSION_NO_V: ${{ github.ref_name }}
        run: |
          # Strip "v" prefix from tag for version field
          VERSION="${VERSION_NO_V#v}"
          DMG="genesis-imaging-${GITHUB_REF_NAME}-darwin-arm64.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::warning::DMG not found ($DMG) — skipping appcast generation"
            exit 0
          fi
          ./scripts/generate-appcast.sh "$DMG" "$VERSION" > appcast.xml
          xmllint --noout appcast.xml
          echo "✅ appcast.xml generated + xmllint valid ($(wc -l < appcast.xml) lines)"

      - name: Generate softwareasan-portal installation token
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        id: portal-app-token
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PORTAL_APP_ID }}
          private-key: ${{ secrets.PORTAL_APP_PRIVATE_KEY }}
          owner: Software-As-An-AI
          repositories: softwareasan-portal

      - name: Publish appcast.xml to softwareasan-portal
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        env:
          HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY != '' }}
          PORTAL_TOKEN: ${{ steps.portal-app-token.outputs.token }}
          VERSION: ${{ github.ref_name }}
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          if [ ! -f appcast.xml ]; then
            echo "::warning::appcast.xml missing — skipping cross-repo publish"
            exit 0
          fi
          # GitHub App installation token (org-aligned auth).
          # App: genesis-imaging-release-bot, scoped to softwareasan-portal only.
          # Permissions: Contents=Read+Write, Metadata=Read.
          #
          # Auth pattern (defensive): use http.extraheader with HTTP Basic auth
          # (base64-encoded `x-access-token:TOKEN`) — the EXACT pattern used by
          # actions/checkout. Both `Authorization: token TOKEN` API-style and
          # URL-embedded basic auth FAIL on macOS runners (URL-embedded hangs on
          # osxkeychain credential helper; token-style header is silently ignored
          # by git's HTTP smart transport which expects Basic auth).
          # GIT_TERMINAL_PROMPT=0 + empty credential.helper = fail-fast on bad auth.
          B64_AUTH=$(printf '%s' "x-access-token:${PORTAL_TOKEN}" | base64 | tr -d '\n')
          AUTH_HEADER="AUTHORIZATION: basic ${B64_AUTH}"
          git -c credential.helper= \
              -c "http.https://github.com/.extraheader=${AUTH_HEADER}" \
              clone --depth 1 \
              https://github.com/Software-As-An-AI/softwareasan-portal.git \
              /tmp/portal
          mkdir -p /tmp/portal/public/genesis-imaging
          cp appcast.xml /tmp/portal/public/genesis-imaging/appcast.xml
          cd /tmp/portal
          if git diff --quiet public/genesis-imaging/appcast.xml; then
            echo "appcast.xml unchanged — nothing to commit"
            exit 0
          fi
          git -c user.email=release-bot@genesis.local \
              -c user.name="genesis-imaging-release-bot" \
              add public/genesis-imaging/appcast.xml
          git -c user.email=release-bot@genesis.local \
              -c user.name="genesis-imaging-release-bot" \
              commit -m "chore(appcast): genesis-imaging ${VERSION} (auto-generated, ed25519-signed)"
          git -c credential.helper= \
              -c "http.https://github.com/.extraheader=${AUTH_HEADER}" \
              push origin main
          echo "✅ appcast.xml published to softwareasan-portal main"

      - name: List release artifacts
        run: ls -lh genesis-imaging-${GITHUB_REF_NAME}-darwin-arm64.* 2>/dev/null || true

      - uses: actions/upload-artifact@v5
        with:
          name: genesis-imaging-${{ github.ref_name }}-darwin-arm64
          path: genesis-imaging-${{ github.ref_name }}-darwin-arm64.*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: genesis-imaging-${{ github.ref_name }}-darwin-arm64
          path: release/

      - name: Prepare release assets
        run: |
          ls -la release/
          if [ -z "$(ls -A release/)" ]; then
            echo "::error::release/ is empty — artifact download failed"
            exit 1
          fi
          cd release && shasum -a 256 * > checksums.txt

      - name: Generate release notes
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..${CURRENT_TAG}" --no-merges \
              | grep -v "Co-Authored-By" \
              | grep -v "skip-release" \
              | head -30)
          else
            COMMITS=$(git log --pretty=format:"- %s" -10 --no-merges \
              | grep -v "Co-Authored-By" \
              | head -10)
          fi

          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" | sed -E 's/^- feat(\([^)]*\))?: */- /' || true)
          FIXES=$(echo "$COMMITS" | grep -i "^- fix" | sed -E 's/^- fix(\([^)]*\))?: */- /' || true)
          OTHER=$(echo "$COMMITS" | grep -iv "^- feat\|^- fix\|^- ci\|^- chore\|^- docs" || true)

          {
            echo "## Genesis Imaging ${CURRENT_TAG}"
            echo
            echo "On-device image upscaling for macOS — Apple Silicon native."
            if [ -n "$FEATURES" ]; then echo; echo "### Yenilikler"; echo "$FEATURES"; fi
            if [ -n "$FIXES" ];    then echo; echo "### Düzeltmeler"; echo "$FIXES";    fi
            if [ -n "$OTHER" ];    then echo; echo "### Diğer";       echo "$OTHER";    fi
            echo
            echo "---"
            echo
            echo "### macOS Kurulum"
            echo "1. **DMG** dosyasını indirin"
            echo "2. DMG'yi açın, **Genesis Imaging** simgesini **Applications** klasörüne sürükleyin"
            echo "3. Uygulamayı başlatın"
            echo
            echo "> Apple Silicon (M1+) gerekir, macOS 14.0+ önerilir."
            echo
            echo "Doğrulama: SHA256 değerleri \`checksums.txt\` içinde."
          } > /tmp/release-notes.md

          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: /tmp/release-notes.md
