name: CI

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    # Phase A.4 (v0.6.0.0): bumped macos-14 → macos-15 (Sequoia + Xcode 16 +
    # Swift 6.0) for flux-2-swift-mlx + Package.swift tools-version:6.0.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode (Swift 6.2+ for flux-2-swift-mlx Sendable strict)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-path

      - name: Cache ncnn binary download
        id: cache-ncnn
        uses: actions/cache@v4
        with:
          path: .build/cache/ncnn
          key: ncnn-vulkan-20220424-${{ runner.os }}

      - name: Fetch ncnn-vulkan binary + models
        run: ./scripts/fetch-ncnn-binary.sh

      - name: Fetch Smart Output binaries (pngquant + oxipng)
        run: ./scripts/fetch-smart-output-binaries.sh

      - name: Stamp VersionStamp.swift (dev kind, CI provenance)
        env:
          BUILD_KIND: dev
        run: ./scripts/stamp-version.sh

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release smoke)
        run: swift build -c release
